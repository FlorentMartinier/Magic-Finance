name: Build, Migrate and Publish on OCI

on:
  push:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # --- JOB 1 : MIGRATION DE LA BASE DE DONNÉES ---
  database-migration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Redgate Flyway CLI
        uses: red-gate/setup-flyway@v3
        with:
          edition: community
          i-agree-to-the-eula: true
      - name: Run Flyway Migrations on Production DB
        run: |
          flyway -url="${{ secrets.PROD_DB_URL }}" \
                 -user="${{ secrets.PROD_DB_USER }}" \
                 -password="${{ secrets.PROD_DB_PASSWORD }}" \
                 -locations="filesystem:src/main/resources/db/migration" \
                 migrate

  # --- JOB 2 : Déploiement sur OCI ---
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Donner les permissions d'exécution à Gradlew
        run: chmod +x gradlew

      - name: Build du JAR avec Gradle
        run: ./gradlew bootJar -x test

      - name: Déploiement vers la VM Oracle via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          source: "build/libs/app.jar"
          target: "/home/ubuntu/"
          strip_components: 2

      - name: Redémarrer le service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            sudo systemctl restart magic-backend