name: Build, Migrate and Publish Docker Image

on:
  push:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # --- JOB 1 : MIGRATION DE LA BASE DE DONNÉES ---
  database-migration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flyway CLI
        uses: redaspen/flyway-github-action@v1.0.0 # Permet d'avoir la commande flyway directement

      - name: Run Flyway Migrations on Production DB
        run: |
          flyway -url="${{ secrets.PROD_DB_URL }}" \
                 -user="${{ secrets.PROD_DB_USER }}" \
                 -password="${{ secrets.PROD_DB_PASSWORD }}" \
                 -locations="filesystem:src/main/resources/db/migration" \
                 migrate

  # --- JOB 2 : COMPILATION & CRÉATION IMAGE DOCKER ---
  build-and-push-docker:
    needs: database-migration # Ne se lance que si la BDD s'est mise à jour sans erreur !
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-platform support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Généré automatiquement par GitHub

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max